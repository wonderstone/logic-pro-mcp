name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent framework surfaces
        run: python3 Scripts/validate_agent_framework.py

      - name: Self-test closeout truth audit
        run: python3 Scripts/closeout_truth_audit.py --self-test

      - name: Smoke test discussion packet generator
        run: python3 Scripts/init_discussion_packet.py --task-id framework-smoke --question "smoke" --stdout > /dev/null

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: swift build -c release

      - name: Run tests
        run: swift test
